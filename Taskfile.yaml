# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: 3
set: [pipefail]
shopt: [globstar]
vars:
  BOOTSTRAP_DIR: '{{.ROOT_DIR}}/bootstrap'
  KUBERNETES_DIR: '{{.ROOT_DIR}}/kubernetes'
  SCRIPTS_DIR: '{{.ROOT_DIR}}/scripts'
  TALOS_DIR: '{{.ROOT_DIR}}/talos'
  PRIVATE_DIR: '{{.ROOT_DIR}}/.private'
  TALOSCONFIG: '{{.ROOT_DIR}}/talos/clusterconfig/talosconfig'
env:
  KUBECONFIG: '{{.ROOT_DIR}}/kubeconfig'
  SOPS_AGE_KEY_FILE: '{{.ROOT_DIR}}/age.key'
  TALOSCONFIG: '{{.TALOSCONFIG}}'
includes:
  bootstrap: .taskfiles/bootstrap
  dev: .taskfiles/dev
  talos: .taskfiles/talos
  template: .taskfiles/template
tasks:
  default: task --list
  lint:
    desc: Run pre-commit hooks against all files
    cmd: pre-commit run --all-files
    preconditions:
      - which pre-commit
  reconcile:
    desc: Force Flux to pull in changes from your Git repository
    cmd: flux --namespace flux-system reconcile kustomization flux-system --with-source
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which flux
  argocd:bootstrap:
    desc: Bootstrap the ArgoCD Helm release from bootstrap/helmfile.d/01-apps.yaml
    vars:
      BRANCH:
        sh: git branch --show-current
      SECRET_DOMAIN:
        sh: "kubectl get secret -n flux-system cluster-secrets -o jsonpath='{.data.SECRET_DOMAIN}' | python -c \"import base64,sys;print(base64.b64decode(sys.stdin.read()).decode())\""
    cmd: ARGOCD_TARGET_REVISION=refs/heads/{{.BRANCH}} ARGOCD_SECRET_DOMAIN={{.SECRET_DOMAIN}} helmfile --file {{.BOOTSTRAP_DIR}}/helmfile.d/01-apps.yaml --selector name=argocd sync --hide-notes
    preconditions:
      - test -f {{.KUBECONFIG}}
      - test -f {{.BOOTSTRAP_DIR}}/helmfile.d/01-apps.yaml
      - which helmfile git kubectl
  argocd:bootstrap:verify:
    desc: Verify ArgoCD control-plane workloads after bootstrap
    cmds:
      - kubectl get deploy -n argocd argocd-server argocd-repo-server
      - kubectl get statefulset -n argocd argocd-application-controller
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which kubectl
