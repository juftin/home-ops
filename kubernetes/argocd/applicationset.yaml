apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: home-ops-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - namespace: kube-system
                  wave: '0'
                - namespace: cert-manager
                  wave: '1'
                - namespace: external-secrets
                  wave: '1'
                - namespace: network
                  wave: '2'
                - namespace: default
                  wave: '3'
                - namespace: observability
                  wave: '4'
          - git:
              repoURL: https://github.com/juftin/home-ops.git
              revision: refs/heads/main
              directories:
                - path: 'kubernetes/apps/{{ .namespace }}/*'
  template:
    metadata:
      name: '{{ printf "%s-%s" .namespace .path.basename }}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .wave }}'
    spec:
      project: home-ops
      source:
        repoURL: https://github.com/juftin/home-ops.git
        targetRevision: refs/heads/main
        path: '{{ .path.path }}/app'
        plugin:
          name: kustomize-substitute-secret-domain
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      ignoreDifferences:
        - group: gateway.networking.k8s.io
          kind: Gateway
          jqPathExpressions:
            - .spec.listeners[].tls.mode
            - .spec.listeners[].tls.certificateRefs[].group
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          jqPathExpressions:
            - .spec.parentRefs[].group
            - .spec.parentRefs[].kind
            - .spec.rules[].matches
        - group: gateway.envoyproxy.io
          kind: SecurityPolicy
          jqPathExpressions:
            - .spec.oidc.refreshToken
            - .spec.oidc.clientSecret.group
            - .spec.oidc.clientSecret.kind
            - .spec.extAuth[].jwt.claims[].valueType
            - .spec.extAuth[].oidc.providers[].remoteJWKS.cacheDuration
        - group: apps
          kind: StatefulSet
          name: loki
          namespace: observability
          jqPathExpressions:
            - .spec.template.spec.containers[].livenessProbe.httpGet.scheme
            - .spec.template.spec.containers[].terminationMessagePath
            - .spec.template.spec.containers[].terminationMessagePolicy
            - .spec.template.spec.containers[].resources
            - .spec.template.spec.dnsPolicy
            - .spec.template.spec.restartPolicy
            - .spec.template.spec.schedulerName
            - .spec.template.spec.serviceAccount
            - .spec.template.spec.volumes[].configMap.defaultMode
            - .spec.updateStrategy.type
            - .spec.updateStrategy.rollingUpdate.maxUnavailable
            - .spec.volumeClaimTemplates[].spec.volumeMode
            - .spec.volumeClaimTemplates[].status
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - Replace=true
