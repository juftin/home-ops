apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./certificate.yaml
  - ./envoy.yaml
  - ./podmonitor.yaml
  - ./oauth-client-secret.sops.yaml
  - ./oauth-policy.sops.yaml
  - ./oauth-policy-internal.sops.yaml
helmCharts:
  - name: gateway-helm
    repo: oci://mirror.gcr.io/envoyproxy
    version: v1.7.0
    releaseName: envoy-gateway
    namespace: network
    includeCRDs: true
    valuesFile: ./values.yaml
patchesStrategicMerge:
  - ./remove-hook-annotations.yaml
  - ./ignore-extraneous-diffs.yaml
