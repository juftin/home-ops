data: |
  apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: SecurityPolicy
  metadata:
    name: envoy-oauth-internal-policy
    namespace: network
    annotations:
      home-ops.io/auth-mode: authentik
      home-ops.io/legacy-mode: available
  spec:
    targetRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: envoy-oauth-internal
    oidc:
      provider:
        issuer: https://auth.${SECRET_DOMAIN}/application/o/home-ops
        authorizationEndpoint: https://auth.${SECRET_DOMAIN}/application/o/authorize/
      clientID: 706743218818-jp4s5vunfp9ac1euuu4j0sh5t46palg6.apps.googleusercontent.com
      clientSecret:
        name: oauth-client-secret
        namespace: network
      redirectURL: https://oauth-internal.${SECRET_DOMAIN}/oauth2/callback
      logoutPath: /logout
      cookieDomain: ${SECRET_DOMAIN}
      cookieNames:
        accessToken: AccessToken
        idToken: IdToken
      scopes:
        - openid
        - email
        - profile
    jwt:
      providers:
        - name: authentik
          issuer: https://auth.${SECRET_DOMAIN}/application/o/home-ops
          remoteJWKS:
            uri: https://auth.${SECRET_DOMAIN}/application/o/home-ops/jwks/
          extractFrom:
            cookies:
              - IdToken
            headers:
              - name: Authorization
                valuePrefix: 'Bearer '
            params:
              - access_token
    authorization:
      defaultAction: Deny
      rules:
        - name: allow-authentik-groups
          action: Allow
          principal:
            jwt:
              provider: authentik
              claims:
                - name: groups
                  values:
                    - home-ops:protected
                - name: email_verified
                  values:
                    - "true"
