fullnameOverride: kube-prometheus-stack
defaultRules:
  rules:
    kubeProxy: false
prometheus:
  prometheusSpec:
    scrapeInterval: 30s
    retention: 30d
    securityContext:
      fsGroup: 0
      runAsGroup: 0
      runAsNonRoot: false
      runAsUser: 0
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: node-local
          resources:
            requests:
              storage: 30Gi
grafana:
  enabled: true
  admin:
    existingSecret: grafana-admin-creds
    userKey: username
    passwordKey: password
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.observability.svc.cluster.local:3100
      access: proxy
      isDefault: false
alertmanager:
  enabled: true
  alertmanagerSpec:
    secrets:
      - alertmanager-slack-webhook
  config:
    global:
      slack_api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url
    route:
      receiver: slack
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
    receivers:
      - name: "null"
      - name: slack
        slack_configs:
          - channel: "#alerts"
            send_resolved: true
            title: '{{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
nodeExporter:
  enabled: true
kubeStateMetrics:
  enabled: true
