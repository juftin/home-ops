apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./clusterrolebinding.yaml
  - ./dnsendpoint.yaml
  - ./externalsecret.yaml
  - ./httproute.yaml
  - ./serviceaccount.yaml
helmCharts:
  - name: headlamp
    repo: oci://ghcr.io/home-operations/charts-mirror
    version: 0.40.0
    releaseName: headlamp
    namespace: observability
    includeCRDs: true
    valuesFile: ./values.yaml
