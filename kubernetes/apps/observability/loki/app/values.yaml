deploymentMode: SingleBinary
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    retention_period: 168h
  compactor:
    delete_request_store: filesystem
    retention_enabled: true
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
    storageClass: node-local
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
gateway:
  enabled: false
memberlist:
  service:
    publishNotReadyAddresses: true
test:
  enabled: false
monitoring:
  selfMonitoring:
    enabled: false
  serviceMonitor:
    enabled: true
