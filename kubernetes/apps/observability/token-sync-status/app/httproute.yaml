# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: token-sync-status
  namespace: observability
spec:
  hostnames: ["headlamp.${SECRET_DOMAIN}"]
  parentRefs:
    - name: envoy-oauth
      namespace: network
      sectionName: https
  rules:
    - matches:
        - path:
            type: Exact
            value: /token-sync/status
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /status.json
      backendRefs:
        - name: token-sync-status
          namespace: observability
          port: 80
    - matches:
        - path:
            type: Exact
            value: /token-sync/sources
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /sources.json
      backendRefs:
        - name: token-sync-status
          namespace: observability
          port: 80
    - matches:
        - path:
            type: Exact
            value: /token-sync/incidents
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /incidents.json
      backendRefs:
        - name: token-sync-status
          namespace: observability
          port: 80
