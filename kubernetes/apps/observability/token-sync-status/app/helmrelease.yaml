apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: token-sync-status
spec:
  chartRef:
    kind: OCIRepository
    name: token-sync-status
  interval: 1h
  values:
    controllers:
      token-sync-status:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: nginx
              tag: alpine
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
    configMaps:
      token-sync-status-data:
        data:
          status.json: |
            {
              "state": "in_sync",
              "authoritativeSource": "k8s-secret",
              "lastVerifiedAt": "1970-01-01T00:00:00Z",
              "lastFailureAt": null,
              "reasonCode": null,
              "details": "Waiting for first sync check."
            }
          sources.json: |
            {
              "items": [
                {
                  "name": "k8s-secret",
                  "kind": "materialized_secret",
                  "fingerprint": "unknown",
                  "observedAt": "1970-01-01T00:00:00Z",
                  "priority": 10,
                  "availability": "degraded"
                },
                {
                  "name": "onepassword",
                  "kind": "upstream_secret_store",
                  "fingerprint": "unknown",
                  "observedAt": "1970-01-01T00:00:00Z",
                  "priority": 20,
                  "availability": "degraded"
                }
              ]
            }
          incidents.json: |
            {
              "items": []
            }
    persistence:
      status-data:
        type: configMap
        name: token-sync-status-data
        globalMounts:
          - path: /usr/share/nginx/html
    service:
      app:
        controller: token-sync-status
        ports:
          http:
            port: 80
