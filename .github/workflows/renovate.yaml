# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: renovate
on:
  workflow_dispatch:
  schedule:
    - cron: "0/15 * * * *"
  push:
    paths:
      - .github/workflows/renovate.yaml
      - .github/renovate-config.js
      - .renovaterc.json5
    branches:
      - main
jobs:
  renovate:
    name: renovate
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: false
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
      - name: renovate
        uses: renovatebot/github-action@abd08c7549b2a864af5df4a2e369c43f035a6a9d # v46.1.5
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: .github/renovate-config.js
          # renovate: datasource=github-releases depName=renovatebot/renovate
          renovate-version: 43.61.7
        env:
          RENOVATE_REPOSITORY: ${{ github.repository }}
          RENOVATE_DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          RENOVATE_DOCKER_PASSWORD: ${{ secrets.DOCKER_TOKEN }}
          LOG_LEVEL: info
