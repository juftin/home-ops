# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'
tasks:
  validate:
    desc: Validate Flux manifests locally with flux-local (no cluster needed)
    vars:
      # renovate: datasource=docker depName=ghcr.io/allenporter/flux-local
      FLUX_LOCAL_IMAGE: ghcr.io/allenporter/flux-local:v8.1.0
      GIT_COMMON_DIR:
        sh: git rev-parse --git-common-dir
    cmd: >-
      docker run --rm -v {{.ROOT_DIR}}:/github/workspace -v {{.GIT_COMMON_DIR}}:{{.GIT_COMMON_DIR}} -w /github/workspace {{.FLUX_LOCAL_IMAGE}} test --enable-helm --all-namespaces --path /github/workspace/kubernetes/flux/cluster -v
    preconditions:
      - which docker
  worktree:create:
    desc: Create a feature worktree under ./worktrees and link required local files
    requires:
      vars: [NAME]
    cmds:
      - mkdir -p {{.ROOT_DIR}}/worktrees
      - git worktree add {{.ROOT_DIR}}/worktrees/{{.NAME}} -b {{.NAME}}
      - ln -snf {{.ROOT_DIR}}/age.key {{.ROOT_DIR}}/worktrees/{{.NAME}}/age.key
      - ln -snf {{.ROOT_DIR}}/kubeconfig {{.ROOT_DIR}}/worktrees/{{.NAME}}/kubeconfig
    preconditions:
      - which git
  worktree:remove:
    desc: Remove a feature worktree from ./worktrees
    requires:
      vars: [NAME]
    cmd: git worktree remove {{.ROOT_DIR}}/worktrees/{{.NAME}}
    preconditions:
      - which git
  start:
    desc: Switch Flux to reconcile the current git branch [must not be on main]
    vars:
      BRANCH:
        sh: git branch --show-current
    cmds:
      - task: _guard-not-main
        vars: {BRANCH: '{{.BRANCH}}'}
      - git push origin {{.BRANCH}}
      - flux suspend helmrelease flux-instance -n flux-system
      - kubectl patch gitrepository flux-system -n flux-system --type=merge -p '{"spec":{"ref":{"name":"refs/heads/{{.BRANCH}}"}}}'
      - flux -n flux-system reconcile source git flux-system
      - flux -n flux-system reconcile kustomization flux-system
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which flux kubectl git
  sync:
    desc: Push current branch and trigger Flux to reconcile it
    vars:
      BRANCH:
        sh: git branch --show-current
    cmds:
      - task: _guard-not-main
        vars: {BRANCH: '{{.BRANCH}}'}
      - git push origin {{.BRANCH}}
      - flux -n flux-system reconcile source git flux-system
      - flux -n flux-system reconcile kustomization flux-system
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which flux git
  stop:
    desc: Restore Flux to watch main and resume normal reconciliation
    cmds:
      - kubectl patch gitrepository flux-system -n flux-system --type=merge -p '{"spec":{"ref":{"name":"refs/heads/main"}}}'
      - flux resume helmrelease flux-instance -n flux-system
      - flux -n flux-system reconcile source git flux-system
      - flux -n flux-system reconcile kustomization flux-system
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which flux kubectl
  argocd:render:
    desc: Render ArgoCD root manifests locally with kustomize
    cmd: kustomize build {{.ROOT_DIR}}/kubernetes/argocd >/dev/null
    preconditions:
      - test -d {{.ROOT_DIR}}/kubernetes/argocd
      - which kustomize
  argocd:migrate-wave:
    desc: Run one ArgoCD migration wave for a namespace
    requires:
      vars: [WAVE, NAMESPACE]
    cmd: '{{.ROOT_DIR}}/scripts/migrate-argocd-wave.sh --wave {{.WAVE}} --namespace {{.NAMESPACE}}'
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which kubectl
  argocd:verify-wave:
    desc: Verify one migration wave (health, sync, drift, ownership)
    requires:
      vars: [WAVE, NAMESPACE]
    cmd: '{{.ROOT_DIR}}/scripts/verify-argocd-cutover.sh --scope wave --wave {{.WAVE}} --namespace {{.NAMESPACE}}'
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which kubectl
  argocd:verify-cutover:
    desc: Verify full ArgoCD ownership cutover status
    cmd: '{{.ROOT_DIR}}/scripts/verify-argocd-cutover.sh --scope full-cutover'
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which kubectl
  argocd:rollback-wave:
    desc: Run ArgoCD-only rollback for a migration wave
    requires:
      vars: [WAVE, REASON]
    cmd: '{{.ROOT_DIR}}/scripts/rollback-argocd-wave.sh --wave {{.WAVE}} --reason "{{.REASON}}"'
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which kubectl
  argocd:health:
    desc: Check ArgoCD control-plane deployment health
    cmds:
      - kubectl get deploy -n argocd argocd-server argocd-repo-server
      - kubectl get statefulset -n argocd argocd-application-controller
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which kubectl
  argocd:verify-health:
    desc: Verify ArgoCD application health and sync status for full cutover
    cmd: '{{.ROOT_DIR}}/scripts/verify-argocd-cutover.sh --scope full-cutover'
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which kubectl
  argocd:validate-rbac:
    desc: Verify ArgoCD RBAC ConfigMap is present
    cmd: kubectl get configmap -n argocd argocd-rbac-cm -o yaml >/dev/null
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which kubectl
  _guard-not-main:
    internal: true
    requires:
      vars: [BRANCH]
    cmd: |
      if [ "{{.BRANCH}}" = "main" ]; then
        echo "Error: dev tasks cannot be used on the main branch"
        exit 1
      fi
