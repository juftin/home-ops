version: '3'
tasks:
  validate:
    desc: Validate ArgoCD app rendering locally (no cluster required)
    cmd: '{{.ROOT_DIR}}/scripts/validate-argocd-render.sh'
    preconditions:
      - which kustomize helm sops yq
      - test -x {{.ROOT_DIR}}/scripts/validate-argocd-render.sh
  worktree:create:
    desc: Create a feature worktree under ./worktrees and link required local files
    requires:
      vars: [NAME]
    cmds:
      - mkdir -p {{.ROOT_DIR}}/worktrees
      - git worktree add {{.ROOT_DIR}}/worktrees/{{.NAME}} -b {{.NAME}}
      - ln -snf {{.ROOT_DIR}}/age.key {{.ROOT_DIR}}/worktrees/{{.NAME}}/age.key
      - ln -snf {{.ROOT_DIR}}/kubeconfig {{.ROOT_DIR}}/worktrees/{{.NAME}}/kubeconfig
    preconditions:
      - which git
  worktree:remove:
    desc: Remove a feature worktree from ./worktrees
    requires:
      vars: [NAME]
    cmd: git worktree remove {{.ROOT_DIR}}/worktrees/{{.NAME}}
    preconditions:
      - which git
  start:
    desc: Switch ArgoCD apps to the current git branch [must not be on main]
    vars:
      BRANCH:
        sh: git branch --show-current
    cmds:
      - task: _guard-not-main
        vars: {BRANCH: '{{.BRANCH}}'}
      - git push origin {{.BRANCH}}
      - kubectl patch application home-ops-root -n argocd --type=merge -p '{"spec":{"source":{"targetRevision":"refs/heads/{{.BRANCH}}"}}}'
      - kubectl patch applicationset home-ops -n argocd --type=json -p='[{"op":"replace","path":"/spec/generators/0/matrix/generators/1/git/revision","value":"refs/heads/{{.BRANCH}}"},{"op":"replace","path":"/spec/template/spec/source/targetRevision","value":"refs/heads/{{.BRANCH}}"}]'
      - kubectl annotate application -n argocd home-ops-root argocd.argoproj.io/refresh=hard --overwrite
      - kubectl annotate applicationset -n argocd home-ops argocd.argoproj.io/application-set-refresh=true --overwrite
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which kubectl git
  sync:
    desc: Push current branch and trigger ArgoCD refresh
    vars:
      BRANCH:
        sh: git branch --show-current
    cmds:
      - task: _guard-not-main
        vars: {BRANCH: '{{.BRANCH}}'}
      - git push origin {{.BRANCH}}
      - kubectl patch applicationset home-ops -n argocd --type=json -p='[{"op":"replace","path":"/spec/generators/0/matrix/generators/1/git/revision","value":"refs/heads/{{.BRANCH}}"},{"op":"replace","path":"/spec/template/spec/source/targetRevision","value":"refs/heads/{{.BRANCH}}"}]'
      - kubectl annotate application -n argocd home-ops-root argocd.argoproj.io/refresh=hard --overwrite
      - kubectl annotate applicationset -n argocd home-ops argocd.argoproj.io/application-set-refresh=true --overwrite
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which kubectl git
  stop:
    desc: Restore ArgoCD apps to track main
    cmds:
      - kubectl patch application home-ops-root -n argocd --type=merge -p '{"spec":{"source":{"targetRevision":"refs/heads/main"}}}'
      - kubectl patch applicationset home-ops -n argocd --type=json -p='[{"op":"replace","path":"/spec/generators/0/matrix/generators/1/git/revision","value":"refs/heads/main"},{"op":"replace","path":"/spec/template/spec/source/targetRevision","value":"refs/heads/main"}]'
      - kubectl annotate application -n argocd home-ops-root argocd.argoproj.io/refresh=hard --overwrite
      - kubectl annotate applicationset -n argocd home-ops argocd.argoproj.io/application-set-refresh=true --overwrite
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which kubectl
  argocd:render:
    desc: Render ArgoCD root manifests locally with kustomize
    cmd: kustomize build {{.ROOT_DIR}}/kubernetes/argocd >/dev/null
    preconditions:
      - test -d {{.ROOT_DIR}}/kubernetes/argocd
      - which kustomize
  argocd:health:
    desc: Check ArgoCD control-plane deployment health
    cmds:
      - kubectl get deploy -n argocd argocd-server argocd-repo-server
      - kubectl get statefulset -n argocd argocd-application-controller
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which kubectl
  argocd:verify-health:
    desc: Verify ArgoCD application health and sync status
    cmds:
      - kubectl get applications.argoproj.io -n argocd
      - kubectl get applications.argoproj.io -n argocd -o json | yq eval --exit-status '[.items[] | select(.status.health.status != "Healthy")] | length == 0' -
      - kubectl get applications.argoproj.io -n argocd -o json | yq eval --exit-status '[.items[] | select(.status.sync.status != "Synced")] | length == 0' -
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which kubectl yq
  argocd:validate-rbac:
    desc: Verify ArgoCD RBAC ConfigMap is present
    cmd: kubectl get configmap -n argocd argocd-rbac-cm -o yaml >/dev/null
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which kubectl
  _guard-not-main:
    internal: true
    requires:
      vars: [BRANCH]
    cmd: |
      if [ "{{.BRANCH}}" = "main" ]; then
        echo "Error: dev tasks cannot be used on the main branch"
        exit 1
      fi
